<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩认知挑战 - 50关精调版</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00ffcc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #ui-header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        .level-badge {
            font-size: 0.9rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .level-val {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            margin: 0;
        }

        #game-board {
            width: 90vw;
            height: 90vw;
            max-width: 520px;
            max-height: 520px;
            background-color: #252525;
            border-radius: 12px;
            padding: 10px;
            display: grid;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .block {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        .block:active {
            transform: scale(0.92);
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        button {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 15px 50px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,255,204,0.3);
        }

        .rank-info { font-size: 1.5rem; margin: 20px 0; color: #ffd700; }
    </style>
</head>
<body>

    <div id="ui-header">
        <div class="level-badge">Checkpoint</div>
        <h1 class="level-val" id="lv-display">1</h1>
    </div>

    <div id="game-board"></div>

    <div id="overlay">
        <h2 id="end-title">挑战结束</h2>
        <div id="end-rank" class="rank-info"></div>
        <button onclick="initGame()">重新开始</button>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const lvDisplay = document.getElementById('lv-display');
        const overlay = document.getElementById('overlay');
        const endRank = document.getElementById('end-rank');

        let currentLv = 1;
        const totalLvs = 50;

        // 难度曲线算法
        function getDifficulty(lv) {
            // 矩阵尺寸：2x2 (lv1) -> 17x17 (lv50)
            const size = Math.min(Math.floor(lv / 4) + 3, 17);
            
            // 色差算法：初始色差调低至 45，随后依比例递减
            // 使用对数衰减，让前几关色差迅速缩减到正常挑战范围
            let diff = 45 * Math.pow(0.94, lv - 1);
            
            // 保底色差，确保最后几关即便很难，在好屏幕上也理论可辨
            if (diff < 1.8) diff = 1.8; 

            return { size, diff };
        }

        function initGame() {
            currentLv = 1;
            overlay.style.display = 'none';
            renderStage();
        }

        function renderStage() {
            board.innerHTML = '';
            const { size, diff } = getDifficulty(currentLv);
            
            lvDisplay.innerText = currentLv;
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            board.style.gap = size > 10 ? '2px' : '4px';

            // 生成基础色：避开极黑极白，保证 diff 运算后不溢出
            const r = Math.floor(Math.random() * 140) + 60;
            const g = Math.floor(Math.random() * 140) + 60;
            const b = Math.floor(Math.random() * 140) + 60;

            // 随机偏移方向
            const offset = Math.random() > 0.5 ? diff : -diff;
            
            const baseColor = `rgb(${r}, ${g}, ${b})`;
            const targetColor = `rgb(${r + offset}, ${g + offset}, ${b + offset})`;

            const specialIdx = Math.floor(Math.random() * (size * size));

            for (let i = 0; i < size * size; i++) {
                const el = document.createElement('div');
                el.className = 'block';
                el.style.backgroundColor = (i === specialIdx) ? targetColor : baseColor;
                
                el.onclick = () => {
                    if (i === specialIdx) {
                        if (currentLv >= totalLvs) {
                            showEnd(true);
                        } else {
                            currentLv++;
                            renderStage();
                        }
                    } else {
                        showEnd(false);
                    }
                };
                board.appendChild(el);
            }
        }

        function showEnd(isWin) {
            overlay.style.display = 'flex';
            document.getElementById('end-title').innerText = isWin ? "完美谢幕" : "视觉极限";
            endRank.innerText = `等级: ${getRankName(currentLv)}`;
        }

        function getRankName(lv) {
            if (lv < 10) return "初级调色师";
            if (lv < 20) return "资深平面设计";
            if (lv < 35) return "显示器校准仪";
            if (lv < 45) return "夜视之鹰";
            return "造物主的双眼";
        }

        initGame();
    </script>
</body>
</html>
