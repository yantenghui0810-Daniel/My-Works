<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的项目集合</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #1d1d1f; margin-bottom: 30px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: #1d1d1f;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .title { font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

    <h1>我的开发作品集</h1>

    <div class="grid">
        <a href="Digital Menu/index.html" class="card">
            <span class="icon">📜</span>
            <span class="title">Digital Menu</span>
        </a>

        <a href="Gomoku/index.html" class="card">
            <span class="icon">⚫</span>
            <span class="title">Gomoku</span>
        </a>

        <a href="Happy Weekend/index.html" class="card">
            <span class="icon">🥳</span>
            <span class="title">Happy Weekend</span>
        </a>

        <a href="Master of Color/index.html" class="card">
            <span class="icon">🎨</span>
            <span class="title">Master of Color</span>
        </a>

        <a href="Minesweeper/index.html" class="card">
            <span class="icon">💣</span>
            <span class="title">Minesweeper</span>
        </a>

        <a href="Sudoku/index.html" class="card">
            <span class="icon">🔢</span>
            <span class="title">Sudoku</span>
        </a>

        <a href="Three Card Poker/index.html" class="card">
            <span class="icon">🃏</span>
            <span class="title">Three Card Poker</span>
        </a>
    </div>

</body>
</html>
